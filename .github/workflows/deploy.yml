name: Deploy to AWS ECS

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'infra/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag override. Leave blank to use the commit SHA.
        required: false
        type: string
      terraform_only:
        description: Run Terraform only (skip Docker build & ECS deploy)
        required: false
        default: false
        type: boolean
      deploy_only:
        description: Run ECS deploy only (skip Terraform)
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'shu-chatbot-production' }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'shu-chatbot-production-cluster' }}
  ECS_SERVICE: ${{ vars.ECS_SERVICE || 'shu-chatbot-production-service' }}
  ECS_TASK_DEFINITION: ${{ vars.ECS_TASK_DEFINITION || 'shu-chatbot-production' }}
  CONTAINER_NAME: ${{ vars.CONTAINER_NAME || 'shu-chatbot-production' }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE || 'shu-chatbot-tf-lock' }}

concurrency:
  group: shu-chatbot-production
  cancel-in-progress: false

jobs:
  # ── Job 1: Terraform ────────────────────────────────────────────────────────
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event.inputs.deploy_only != 'true' }}

    defaults:
      run:
        working-directory: infra

    outputs:
      ecr_repository_url: ${{ steps.tf-outputs.outputs.ecr_repository_url }}
      ecs_cluster_name: ${{ steps.tf-outputs.outputs.ecs_cluster_name }}
      ecs_service_name: ${{ steps.tf-outputs.outputs.ecs_service_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=shu-chatbot/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}"

      - name: Terraform Plan
        id: plan
        run: |
          # OPENAI_API_KEY is sourced from the production GitHub Actions secret.
          terraform plan \
            -var="aws_region=${AWS_REGION}" \
            -var="openai_api_key=${{ secrets.OPENAI_API_KEY }}" \
            -out=tfplan
          echo "✅ Terraform plan complete"

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve tfplan
          echo "✅ Terraform apply complete"

      - name: Capture Terraform outputs
        id: tf-outputs
        run: |
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "ecs_cluster_name=$(terraform output -raw ecs_cluster_name)"     >> "$GITHUB_OUTPUT"
          echo "ecs_service_name=$(terraform output -raw ecs_service_name)"     >> "$GITHUB_OUTPUT"

  # ── Job 2: Build & Deploy ───────────────────────────────────────────────────
  deploy:
    name: Build Image & Deploy to ECS
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event.inputs.terraform_only != 'true' }}
    needs: [terraform]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ secrets.OPENAI_API_KEY }}" ]]; then
            echo "❌ OPENAI_API_KEY secret is required."
            exit 1
          fi
          if [[ -z "${{ vars.AWS_ROLE_TO_ASSUME }}" ]]; then
            echo "❌ AWS_ROLE_TO_ASSUME variable is required."
            exit 1
          fi
          echo "✅ All required configuration is present."

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}

      - name: Decide image tag
        id: meta
        shell: bash
        run: |
          image_tag=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            image_tag="${{ github.event.inputs.image_tag }}"
          fi
          if [[ -z "${image_tag}" ]]; then
            image_tag="${GITHUB_SHA::12}"
          fi
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "🏷️  Image tag: ${image_tag}"

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build
        shell: bash
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          set -euo pipefail
          IMAGE_URI="${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          echo "🐳 Building: ${IMAGE_URI}"
          docker build --tag "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "✅ Image pushed: ${IMAGE_URI}"

      - name: Download current task definition
        shell: bash
        run: |
          aws ecs describe-task-definition \
            --task-definition "${ECS_TASK_DEFINITION}" \
            --query taskDefinition \
            > task-definition.json
          echo "📋 Task definition downloaded."

      - name: Inject new image into task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build.outputs.image_uri }}
          # OPENAI_API_KEY is injected into the ECS/Fargate task from GitHub Actions secrets.
          environment-variables: |
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Deployment summary
        shell: bash
        run: |
          {
            echo "## ✅ Deployment complete"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Image tag | ${{ steps.meta.outputs.image_tag }} |"
            echo "| Image URI | ${{ steps.build.outputs.image_uri }} |"
            echo "| ECS Task Definition | ${ECS_TASK_DEFINITION} |"
            echo "| ECS Cluster | ${ECS_CLUSTER} |"
            echo "| ECS Service | ${ECS_SERVICE} |"
            echo "| Region | ${AWS_REGION} |"
          } >> "$GITHUB_STEP_SUMMARY"
